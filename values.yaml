# Base Helm values — the deployment-recipe layer for the iterabase-platform chart.
#
# These values OVERRIDE the chart's own defaults (iterabase-platform/values.yaml)
# for a standard Iterabase deployment. Clients fork this repo and add their
# overrides in values.client.yaml (applied after this file; later file wins).
#
# This scaffold is intentionally minimal — the real opinionated recipe lands
# per-deployment (e.g. OPO1, HOR-299). forge applies:
#   helm -f values.yaml -f values.client.yaml
