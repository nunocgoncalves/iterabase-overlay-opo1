# OPO1 overlay secret declarations (NON-SECRET metadata only).
# forge materializes each Secret from the named operator env var (env-first; else
# prompts on TTY, non-echo) via `kubectl apply -f -` over SSH stdin — values never
# touch helm values, git, or the process list (HOR-364). Runs AFTER the overlay
# clone + BEFORE the platform chart, so consumers find the Secret on first
# reconcile.
secrets:
  - name: cloudflare-api-token
    namespace: iterabase-system # release ns; cert-issuers (ClusterIssuer) + external-dns both read it here
    key: api-token
    envVar: CLOUDFLARE_API_TOKEN # forge prompts interactively (no .env); token scoped Zone:DNS:Edit + Zone:Read on iterabase.com
